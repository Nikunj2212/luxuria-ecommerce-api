{% extends "dashboard/base_old.html" %}
{% block title %}Add Product{% endblock %}

{% block content %}
<style>
.form-wrapper {
    max-width: 700px;
    margin: 40px auto;
    background: white;
    padding: 32px;
    border-radius: 16px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}
.form-wrapper h2 {
    font-size: 24px;
    margin-bottom: 22px;
    color: #2c5a4c;
}
.form-group {
    margin-bottom: 18px;
}
input, select, textarea {
    width: 90%;
    padding: 14px;
    border: 1px solid #aaccc2;
    border-radius: 10px;
    font-size: 15px;
}
textarea {
    height: 110px;
    resize: none;
}
button {
    padding: 12px 20px;
    background: #317f6f;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
}
button:hover { opacity: .9; }
</style>

<div class="form-wrapper">
    <h2>Add Product</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <input type="text" name="name" placeholder="Product name" required>
        </div>

        <div class="form-group">
            <input type="number" name="price" placeholder="Price" required>
        </div>

        <div class="form-group">
            <textarea name="description" placeholder="Description"></textarea>
        </div>

        <!-- CATEGORY -->
        <div class="form-group">
            <select name="category" id="category" required>
             <option value="">Select category</option>
             {% for cat in categories %}
            <option value="{{ cat.id }}">{{ cat.name }}</option>
             {% endfor %}
            </select>
         
        </div>

        <!-- SUBCATEGORY (AJAX FILLED) -->
        <div class="form-group">
            <select name="subcategory" id="subcategory" required>
                 <option value="">Select subcategory</option>
            </select>

        </div>

        <div class="form-group">
            <input type="file" name="image" required>
        </div>

        <button type="submit">Save Product</button>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    const categorySelect = document.getElementById('category');
    const subcategorySelect = document.getElementById('subcategory');

    categorySelect.addEventListener('change', function () {
        const categoryId = this.value;

        // reset
        subcategorySelect.innerHTML = '<option value="">Loading...</option>';

        if (!categoryId) {
            subcategorySelect.innerHTML = '<option value="">Select subcategory</option>';
            return;
        }

        fetch(`/products/load-subcategories/?category_id=${categoryId}`)
            .then(response => response.json())
            .then(data => {
                subcategorySelect.innerHTML = '<option value="">Select subcategory</option>';

                if (data.length === 0) {
                    subcategorySelect.innerHTML += '<option>No subcategories</option>';
                }

                data.forEach(sub => {
                    const option = document.createElement('option');
                    option.value = sub.id;
                    option.textContent = sub.name;
                    subcategorySelect.appendChild(option);
                });
            })
            .catch(error => {
                console.error(error);
                subcategorySelect.innerHTML = '<option>Error loading</option>';
            });
    });

});
</script>


{% endblock %}
