{% extends "dashboard/auth_base.html" %}
{% block title %}Register Admin{% endblock %}
{% block content %}

<style>
.form-box {
    max-width: 450px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
}
.form-box h2 {
    font-size: 24px;
    margin-bottom: 20px;
    text-align: center;
    color: #0b4e3d;
}
.form-box input {
    width: 90%;
    padding: 12px;
    border: 1px solid #c8e4e0;
    border-radius: 8px;
    margin-bottom: 15px;
}
.form-box button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #0b4e3d;
    color: white;
    font-size: 15px;
}
.form-box button:hover {
    background: #08382d;
}
</style>

<div class="form-box">
    <h2>Create Admin Account</h2>

    <form method="POST">{% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email address" required>
        <input type="password" name="password1" placeholder="Password" required>
        <input type="password" name="password2" placeholder="Confirm password" required>

        <button type="submit">Register</button>
    </form>

    <p style="margin-top:10px; text-align:center;
       font-size:14px;">
       Already an admin?
       <a href="{% url 'dashboard:dashboard_login' %}">Login</a>
    </p>
</div>

{% endblock %}
