{% extends "base.html" %}
{% load static %}

{% block title %}Categories | Luxuria{% endblock %}

{% block content %}

<style>
.categories-page{
    max-width:1300px;
    margin:60px auto;
    padding:0 20px;
}

.categories-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:24px;
}

.category-card{
    background:#fff;
    border-radius:18px;
    padding:20px;
    text-align:center;
    text-decoration:none;
    color:var(--text-dark);
    box-shadow:0 10px 22px rgba(0,0,0,.1);
    transition:.3s;
}

.category-card img{
    width:100%;
    height:140px;
    object-fit:contain;
    margin-bottom:12px;
}

.category-card:hover{
    transform:translateY(-6px);
    background:var(--brand-color);
    color:#fff;
}
</style>

<div class="categories-page">
    <h2 class="section-title">📂 All Categories</h2>

    <div class="categories-grid">
        {% for cat in categories %}
        <a href="{% url 'products:category_subcategories' cat.id %}"
           class="category-card">
            {% if cat.image %}
                <img src="{{ cat.image.url }}" alt="{{ cat.name }}">
            {% endif %}
            <strong>{{ cat.name }}</strong>
        </a>
        {% endfor %}
    </div>
</div>

{% endblock %}
