<!DOCTYPE html>
<html>
<head>
<title>Create Account | Luxuria</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#e6fffa,#f0fdfa);
}

/* MAIN CARD */
.container{
    width:1100px;
    margin:80px auto;
    display:flex;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.1);
}

/* LEFT PANEL */
.left{
    width:45%;
    background:linear-gradient(135deg,#0f766e,#0d9488);
    color:white;
    padding:70px 50px;
}
.left h1{
    font-size:44px;
    margin-bottom:15px;
}
.left p{
    font-size:16px;
    opacity:.9;
}

/* RIGHT PANEL */
.right{
    width:55%;
    padding:70px 60px;
}
.right h2{
    font-size:36px;
    margin-bottom:25px;
}

/* ERROR BOX */
.error{
    background:#ffe5e5;
    color:#b00020;
    padding:12px;
    border-radius:10px;
    margin-bottom:20px;
    font-size:14px;
}

/* INPUTS */
input{
    width:100%;
    padding:14px;
    margin-bottom:18px;
    border-radius:12px;
    border:1px solid #e5e7eb;
    background:#f9fafb;
    font-size:15px;
}
input[type="password"]{
    background:#eaf1ff;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    background:#0f766e;
    color:white;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    background:#115e59;
}

/* LINK */
.link{
    text-align:center;
    margin-top:18px;
    font-size:14px;
}
.link a{
    color:#0f766e;
    font-weight:600;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <h1>Welcome to Luxuria</h1>
        <p>Create your account and unlock premium shopping experience.</p>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <h2>Create Account</h2>

        {% if messages %}
        {% for message in messages %}
            <div class="error">{{ message }}</div>
        {% endfor %}
    {% endif %}
    
        <form method="POST" autocomplete="off">
            {% csrf_token %}

            <input type="email"
                name="email"
                placeholder="Email"
                value="{{ email|default:'' }}"
                autocomplete="email"
                required>

            <input type="text"
                name="phone"
                placeholder="Phone Number"
                value="{{ phone|default:'' }}"
                autocomplete="off"
                required>

            <input type="password"
                name="password"
                placeholder="Password"
                autocomplete="new-password"
                required>

            <button type="submit">Create Account</button>
        </form>
    
    
        <div class="link">
            Already have account?
            <a href="{% url 'accounts:login' %}">Login</a>
        </div>
    </div>

</div>

</body>
</html>
