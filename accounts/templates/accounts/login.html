<!DOCTYPE html>
<html>
<head>
<title>Login | Luxuria</title>
<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#e6fffa,#f0fdfa);
}
.container{
    width:1100px;
    margin:60px auto;
    display:flex;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.1);
}
.left{
    width:45%;
    background:linear-gradient(135deg,#0f766e,#0d9488);
    color:white;
    padding:70px 50px;
}
.left h1{font-size:42px;}
.right{
    width:55%;
    padding:70px 60px;
}
h2{
    font-size:36px;
    margin-bottom:30px;
}
input{
    width:100%;
    padding:14px;
    margin-bottom:20px;
    border-radius:12px;
    border:1px solid #e5e7eb;
    background:#f9fafb;
    font-size:15px;
}
button{
    width:100%;
    padding:14px;
    background:#0f766e;
    color:white;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    background:#115e59;
}
.link{
    text-align:center;
    margin-top:15px;
}
.link a{
    color:#0f766e;
    font-weight:600;
    text-decoration:none;
}
.error{
    background:#ffe5e5;
    color:#b00020;
    padding:12px;
    border-radius:10px;
    margin-bottom:20px;
    font-size:14px;
}
.login-error{
    background:#fff1f2;
    color:#dc2626;
    padding:14px 18px;
    border-left:4px solid #dc2626;
    border-radius:10px;
    font-size:14px;
    margin-bottom:18px;
}
</style>
</head>

<body>
    
    <div class="container">
        
        <div class="left">
            <h1>Welcome Back</h1>
            <p>Login to continue your Luxuria shopping journey.</p>
        </div>
        
        <div class="right">
            <h2>Login</h2>
            {% if messages %}
                {% for message in messages %}
                    <div class="login-error">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" autocomplete="off">
                {% csrf_token %}
            
                <input type="text"
                       name="email_or_phone"
                       placeholder="Email or Phone Number"
                       autocomplete="username"
                       required>
            
                <input type="password"
                       name="password"
                       placeholder="Password"
                       autocomplete="new-password"
                       required>
            
                <button type="submit">Login</button>
            </form>

            
            <div class="link">
                <a href="{% url 'accounts:forgot_password' %}">Forgot Password?</a><br>
                No account?
                <a href="{% url 'accounts:signup' %}">Create Account</a>
            </div>
        </div>
        
    </div>
    
</body>
</html>
