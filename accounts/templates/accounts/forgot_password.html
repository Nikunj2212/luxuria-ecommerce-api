<!DOCTYPE html>
<html>
<head>
<title>Forgot Password | Luxuria</title>
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#eaf7f5;
}
.container{
    width:1100px;
    margin:80px auto;
    display:flex;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,0.08);
}
.left{
    flex:1;
    background:linear-gradient(135deg,#0f766e,#0d9488);
    color:white;
    padding:60px;
}
.left h1{
    font-size:42px;
    margin-bottom:20px;
}
.left p{
    font-size:18px;
    opacity:.9;
}
.right{
    flex:1.2;
    background:white;
    padding:60px;
}
.right h2{
    font-size:34px;
    margin-bottom:25px;
}
input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:15px;
}
button{
    width:100%;
    padding:14px;
    background:#0f766e;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}
button:hover{opacity:.9;}
.step{display:none;}
#step-email{display:block;}
.msg{margin-top:10px;color:#0f766e;}
</style>
</head>

<body>

<div class="container">
    <div class="left">
        <h1>Password Recovery</h1>
        <p>Don't worry. Reset your password and continue shopping with Luxuria.</p>
    </div>

    <div class="right">
        <h2>Forgot Password</h2>

        <div id="step-email" class="step">
            <input type="email" id="email" placeholder="Enter your email">
            <button onclick="sendOTP()">Send OTP</button>
        </div>

        <div id="step-otp" class="step">
            <input type="text" id="otp" placeholder="Enter OTP">
            <button onclick="verifyOTP()">Verify OTP</button>
        </div>

        <div id="step-password" class="step">
            <input type="password" id="password1" placeholder="New Password">
            <input type="password" id="password2" placeholder="Confirm Password">
            <button onclick="resetPassword()">Reset Password</button>
        </div>

        <p id="msg" class="msg"></p>
    </div>
</div>

<script>
function showStep(id){
    document.querySelectorAll(".step").forEach(s=>s.style.display="none");
    document.getElementById(id).style.display="block";
}

function sendOTP(){
    fetch("/accounts/ajax/send-otp/",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email:email.value})
    })
    .then(r=>r.json())
    .then(d=>{
        msg.innerText=d.message;
        if(d.status==="ok") showStep("step-otp");
    });
}

function verifyOTP(){
    fetch("/accounts/ajax/verify-otp/",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({otp:otp.value})
    })
    .then(r=>r.json())
    .then(d=>{
        msg.innerText=d.message;
        if(d.status==="ok") showStep("step-password");
    });
}

function resetPassword(){
    fetch("/accounts/ajax/reset-password/",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({password1:password1.value,password2:password2.value})
    })
    .then(r=>r.json())
    .then(d=>{
        msg.innerText=d.message;
    });
}
</script>

</body>
</html>
