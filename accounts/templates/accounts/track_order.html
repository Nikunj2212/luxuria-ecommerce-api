{% extends "accounts/base_account.html" %}
{% block title %}Track Order{% endblock %}

{% block account_content %}

<style>

.track-wrapper{
    max-width:900px;
    margin:20px auto;
    padding:40px;
    border-radius:28px;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    box-shadow:0 25px 60px rgba(0,0,0,.25);
}

/* TOP HEADER */
.track-top{
    display:flex;
    align-items:center;
    gap:18px;
    margin-bottom:25px;
}

.back-btn{
    width:38px;
    height:38px;
    border-radius:50%;
    background:rgba(255,255,255,0.15);
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    color:white;
    font-size:18px;
    transition:.3s;
}

.back-btn:hover{
    background:#14b8a6;
    transform:translateX(-4px);
}

.track-title h2{
    margin:0;
    font-size:24px;
}

.order-id{
    font-size:13px;
    opacity:.7;
}

/* PROGRESS */

.progress-container{
    margin-top:35px;
    position:relative;
}

.progress-line{
    position:absolute;
    top:18px;
    left:5%;
    width:90%;
    height:4px;
    background:rgba(255,255,255,0.2);
}

.progress-fill{
    position:absolute;
    top:18px;
    left:5%;
    height:4px;
    background:#14b8a6;
    transition:.4s;
}

.steps{
    display:flex;
    justify-content:space-between;
    position:relative;
}

.step{
    text-align:center;
    width:25%;
}

.circle{
    width:36px;
    height:36px;
    border-radius:50%;
    background:rgba(255,255,255,0.2);
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 8px;
    font-weight:600;
}

.step.active .circle{
    background:#14b8a6;
    box-shadow:0 0 15px rgba(20,184,166,.6);
}

.step-label{
    font-size:13px;
    opacity:.8;
}

/* STATUS BOX */

.status-box{
    margin-top:35px;
    padding:18px;
    border-radius:16px;
    background:rgba(255,255,255,0.08);
}

.status-box span{
    color:#14b8a6;
    font-weight:600;
}

</style>

<div class="track-wrapper">

    <!-- TOP -->
    <div class="track-top">
        <a href="{% url 'accounts:my_orders' %}" class="back-btn">
            ←
        </a>

        <div class="track-title">
            <h2>📦 Track Your Order</h2>
            <div class="order-id">
                Order ID: {{ order.order_id }}
            </div>
        </div>
    </div>

    <!-- PROGRESS -->
    <div class="progress-container">

        <div class="progress-line"></div>

        <div class="progress-fill"
            style="width:
            {% if order.status == 'PLACED' %}0%
            {% elif order.status == 'PROCESSING' %}33%
            {% elif order.status == 'DISPATCHED' %}66%
            {% elif order.status == 'DELIVERED' %}100%
            {% else %}0%{% endif %};">
        </div>

        <div class="steps">

            <div class="step {% if order.status in 'PLACED PROCESSING DISPATCHED DELIVERED' %}active{% endif %}">
                <div class="circle">1</div>
                <div class="step-label">Placed</div>
            </div>

            <div class="step {% if order.status in 'PROCESSING DISPATCHED DELIVERED' %}active{% endif %}">
                <div class="circle">2</div>
                <div class="step-label">Processing</div>
            </div>

            <div class="step {% if order.status in 'DISPATCHED DELIVERED' %}active{% endif %}">
                <div class="circle">3</div>
                <div class="step-label">Dispatched</div>
            </div>

            <div class="step {% if order.status == 'DELIVERED' %}active{% endif %}">
                <div class="circle">4</div>
                <div class="step-label">Delivered</div>
            </div>

        </div>

    </div>

    <!-- STATUS -->
    <div class="status-box">
        Current Status: <span>{{ order.status }}</span>
    </div>

</div>

{% endblock %}
